<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provenance Guard - Detection Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
        }

        .metric-card.human {
            border-left-color: #10b981;
        }

        .metric-card.uncertain {
            border-left-color: #f59e0b;
        }

        .metric-card.ai {
            border-left-color: #ef4444;
        }

        .metric-card.appeals {
            border-left-color: #8b5cf6;
        }

        .metric-card.certified {
            border-left-color: #06b6d4;
        }

        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .chart-card h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
        }

        .logs-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }

        .log-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .log-card h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .log-table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }

        .log-table thead {
            background: #f3f4f6;
        }

        .log-table th {
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;
        }

        .log-table td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            color: #555;
        }

        .log-table tr:hover {
            background: #f9fafb;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-classified {
            background: #d1fae5;
            color: #065f46;
        }

        .status-under-review {
            background: #fef3c7;
            color: #92400e;
        }

        .confidence-bar {
            display: inline-block;
            width: 60px;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #f59e0b 50%, #ef4444 100%);
        }

        .certified-list {
            list-style: none;
        }

        .certified-item {
            padding: 10px;
            background: #f3f4f6;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .badge-verified {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .logs-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Provenance Guard Dashboard</h1>
            <p class="subtitle">AI Detection System Analytics & Monitoring</p>
        </header>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <!-- Submit Form -->
            <div class="chart-card">
                <h3>📤 Submit Content</h3>
                <form id="submitForm" style="display: flex; flex-direction: column; gap: 12px;">
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333;">Your Text</label>
                        <textarea id="submitText" placeholder="Paste text here for analysis..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: monospace; font-size: 12px; min-height: 100px; resize: vertical;" required></textarea>
                    </div>
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333;">Creator ID</label>
                        <input id="submitCreatorId" type="text" placeholder="your-username" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;" required>
                    </div>
                    <button type="submit" style="background: #667eea; color: white; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s;">Submit for Analysis</button>
                    <div id="submitResult" style="display: none; padding: 10px; border-radius: 6px; font-size: 12px;"></div>
                </form>
            </div>

            <!-- Appeal Form -->
            <div class="chart-card">
                <h3>🗣️ File an Appeal</h3>
                <form id="appealForm" style="display: flex; flex-direction: column; gap: 12px;">
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333;">Content ID</label>
                        <input id="appealContentId" type="text" placeholder="Paste content ID from submission" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: monospace;" required>
                    </div>
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333;">Your Appeal Reason</label>
                        <textarea id="appealReason" placeholder="Explain why you believe the classification is incorrect..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: monospace; font-size: 12px; min-height: 100px; resize: vertical;" required></textarea>
                    </div>
                    <button type="submit" style="background: #8b5cf6; color: white; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s;">Submit Appeal</button>
                    <div id="appealResult" style="display: none; padding: 10px; border-radius: 6px; font-size: 12px;"></div>
                </form>
            </div>
        </div>

        <div class="metrics-grid" id="metricsContainer">
            <div class="loading">Loading metrics...</div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>Classification Breakdown</h3>
                <canvas id="classificationChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Signal Scores Distribution</h3>
                <canvas id="scoresChart"></canvas>
            </div>
        </div>

        <div class="logs-container">
            <div class="log-card">
                <h3>Recent Submissions</h3>
                <div id="submissionsLog" class="loading">Loading...</div>
            </div>
            <div class="log-card">
                <h3>Appeals Log</h3>
                <div id="appealsLog" class="loading">Loading...</div>
            </div>
        </div>

        <div class="log-card" style="margin-top: 20px;">
            <h3>Verified Creators</h3>
            <div id="certificatesLog" class="loading">Loading...</div>
        </div>
    </div>

    <script>
        let classificationChart, scoresChart;

        // Form submission handlers
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('submitText').value;
            const creatorId = document.getElementById('submitCreatorId').value;
            const resultDiv = document.getElementById('submitResult');

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, creator_id: creatorId })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.style.display = 'block';
                    resultDiv.style.background = '#d1fae5';
                    resultDiv.style.color = '#065f46';
                    resultDiv.innerHTML = `
                        ✓ <strong>Submission Successful</strong><br/>
                        Content ID: <code style="font-size: 11px;">${data.content_id}</code><br/>
                        Classification: <strong>${data.label}</strong><br/>
                        Confidence: <strong>${(data.confidence * 100).toFixed(1)}%</strong>
                    `;
                    document.getElementById('submitForm').reset();
                    setTimeout(loadDashboard, 1000);
                } else {
                    throw new Error(data.error || 'Submission failed');
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.style.background = '#fee2e2';
                resultDiv.style.color = '#991b1b';
                resultDiv.innerHTML = `✗ Error: ${error.message}`;
            }
        });

        document.getElementById('appealForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const contentId = document.getElementById('appealContentId').value;
            const reason = document.getElementById('appealReason').value;
            const resultDiv = document.getElementById('appealResult');

            try {
                const response = await fetch('/appeal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content_id: contentId, reason })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.style.display = 'block';
                    resultDiv.style.background = '#dbeafe';
                    resultDiv.style.color = '#1e40af';
                    resultDiv.innerHTML = `
                        ✓ <strong>Appeal Submitted</strong><br/>
                        Appeal ID: <code style="font-size: 11px;">${data.appeal_id}</code><br/>
                        Status: <strong>${data.status}</strong>
                    `;
                    document.getElementById('appealForm').reset();
                    setTimeout(loadDashboard, 1000);
                } else {
                    throw new Error(data.error || 'Appeal failed');
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.style.background = '#fee2e2';
                resultDiv.style.color = '#991b1b';
                resultDiv.innerHTML = `✗ Error: ${error.message}`;
            }
        });

        async function loadDashboard() {
            try {
                // Load analytics
                const analyticsRes = await fetch('/api/analytics');
                const analytics = await analyticsRes.json();

                // Load log
                const logRes = await fetch('/log');
                const logData = await logRes.json();

                // Load appeals
                const appealsRes = await fetch('/api/appeals');
                const appealsData = await appealsRes.json();

                // Load certificates
                const certsRes = await fetch('/certificates');
                const certsData = await certsRes.json();

                renderMetrics(analytics);
                renderCharts(analytics, logData.entries);
                renderLogs(logData.entries, appealsData.appeals, certsData.verified_creators);
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function renderMetrics(analytics) {
            const html = `
                <div class="metric-card">
                    <div class="metric-value">${analytics.total_submissions}</div>
                    <div class="metric-label">Total Submissions</div>
                </div>
                <div class="metric-card human">
                    <div class="metric-value">${analytics.human_classifications}</div>
                    <div class="metric-label">Human Verified</div>
                </div>
                <div class="metric-card uncertain">
                    <div class="metric-value">${analytics.uncertain_classifications}</div>
                    <div class="metric-label">Uncertain</div>
                </div>
                <div class="metric-card ai">
                    <div class="metric-value">${analytics.ai_classifications}</div>
                    <div class="metric-label">High AI Likelihood</div>
                </div>
                <div class="metric-card appeals">
                    <div class="metric-value">${analytics.appeal_rate}%</div>
                    <div class="metric-label">Appeal Rate</div>
                </div>
                <div class="metric-card certified">
                    <div class="metric-value">${analytics.certified_creators}</div>
                    <div class="metric-label">Certified Creators</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${analytics.avg_confidence.toFixed(2)}</div>
                    <div class="metric-label">Avg Confidence</div>
                </div>
            `;
            document.getElementById('metricsContainer').innerHTML = html;
        }

        function renderCharts(analytics, entries) {
            // Classification Chart
            const classificationCtx = document.getElementById('classificationChart').getContext('2d');
            classificationChart = new Chart(classificationCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Verified Human', 'Uncertain', 'High AI Likelihood'],
                    datasets: [{
                        data: [
                            analytics.human_classifications,
                            analytics.uncertain_classifications,
                            analytics.ai_classifications
                        ],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Scores Distribution Chart
            const scores = entries.map(e => e.final_score || 0).sort((a, b) => a - b);
            const scoresCtx = document.getElementById('scoresChart').getContext('2d');
            scoresChart = new Chart(scoresCtx, {
                type: 'line',
                data: {
                    labels: scores.map((_, i) => i + 1),
                    datasets: [{
                        label: 'Confidence Score',
                        data: scores,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 1,
                            ticks: {
                                stepSize: 0.2
                            }
                        }
                    }
                }
            });
        }

        function renderLogs(entries, appeals, certs) {
            // Recent Submissions
            const recentEntries = entries.slice(0, 5);
            const submissionsHtml = recentEntries.length > 0 ? `
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Creator</th>
                            <th>Score</th>
                            <th>Label</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${recentEntries.map(e => `
                            <tr>
                                <td>${e.creator_id}</td>
                                <td>
                                    <div class="confidence-bar">
                                        <div class="confidence-fill" style="width: ${e.final_score * 100}%"></div>
                                    </div>
                                    ${(e.final_score || 0).toFixed(2)}
                                </td>
                                <td style="font-size: 12px; max-width: 150px; word-break: break-word;">${e.label || 'N/A'}</td>
                                <td>
                                    <span class="status-badge ${e.status === 'under_review' ? 'status-under-review' : 'status-classified'}">
                                        ${e.status}
                                    </span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p style="color: #999; text-align: center;">No submissions yet</p>';

            document.getElementById('submissionsLog').innerHTML = submissionsHtml;

            // Appeals Log
            const appealsHtml = appeals && appeals.length > 0 ? `
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Creator</th>
                            <th>Reason Preview</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${appeals.slice(0, 5).map(a => `
                            <tr>
                                <td>${a.creator_id}</td>
                                <td style="font-size: 11px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                    ${a.appeal_reason}
                                </td>
                                <td>
                                    <span class="status-badge status-under-review">
                                        ${a.status}
                                    </span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p style="color: #999; text-align: center;">No appeals yet</p>';

            document.getElementById('appealsLog').innerHTML = appealsHtml;

            // Certified Creators
            const certsHtml = certs && certs.length > 0 ? `
                <ul class="certified-list">
                    ${certs.map(c => `
                        <li class="certified-item">
                            <span>
                                <strong>${c.creator_id}</strong>
                                <br/>
                                <span style="color: #999; font-size: 12px;">
                                    ${c.human_submissions} human submissions
                                </span>
                            </span>
                            <span class="badge-verified">✓ Verified</span>
                        </li>
                    `).join('')}
                </ul>
            ` : '<p style="color: #999; text-align: center;">No verified creators yet</p>';

            document.getElementById('certificatesLog').innerHTML = certsHtml;
        }

        // Load dashboard on page load
        document.addEventListener('DOMContentLoaded', loadDashboard);

        // Refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
